name: Performance

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "benchmarks/**"
      - "src/**"
      - "package.json"
      - "bun.lock"

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Checkout sibling vlist package
        run: git clone --depth=1 https://github.com/floor/vlist.git ../vlist

      - name: Install dependencies
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"
        run: bun install

      - name: Install Chrome for Puppeteer
        run: bunx puppeteer browsers install chrome

      - name: Run perf smoke benchmark
        continue-on-error: true
        run: bun run bench:ci -- --item-counts=10000 --suites=render-vanilla,scrollto-vanilla

      - name: Build comparison summary
        if: hashFiles('benchmarks/results/latest.json') != ''
        run: |
          if [ -f benchmarks/baselines/main.json ]; then
            bun run bench:compare -- --baseline=benchmarks/baselines/main.json
          else
            bun run bench:compare
          fi

      - name: Store CI benchmark results
        if: hashFiles('benchmarks/results/latest.json') != ''
        run: bun run bench:store

      - name: Build PR comment
        if: github.event_name == 'pull_request' && hashFiles('benchmarks/results/latest.json') != ''
        run: bun run bench:comment

      - name: Post PR benchmark comment
        if: github.event_name == 'pull_request' && hashFiles('benchmarks/results/pr-comment.md') != ''
        continue-on-error: true
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- vlist-perf-comment -->";
            const body = fs.readFileSync("benchmarks/results/pr-comment.md", "utf8");
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const previous = comments.find((comment) =>
              comment.user.type === "Bot" && comment.body?.includes(marker)
            );

            if (previous) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: perf-results
          path: |
            benchmarks/results/latest.json
            benchmarks/results/summary.md
            benchmarks/results/comparison.md
            benchmarks/results/pr-comment.md
            data/benchmarks.db
