<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0c0f16"/>
      <stop offset="1" stop-color="#070809"/>
    </linearGradient>
    <radialGradient id="glow" cx="200" cy="120" r="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- virtualized-list motif (right) -->
  <g transform="translate(792 96)">
    <rect x="-24" y="-24" width="372" height="486" rx="20" fill="#0e121b" stroke="#1d2433" stroke-width="1.5"/>
    <rect x="0"  y="0"   width="324" height="44" rx="10" fill="#161c28"/>
    <rect x="0"  y="58"  width="324" height="44" rx="10" fill="#161c28"/>
    <rect x="0"  y="116" width="324" height="44" rx="10" fill="url(#accent)"/>
    <rect x="0"  y="174" width="324" height="44" rx="10" fill="#161c28"/>
    <rect x="0"  y="232" width="324" height="44" rx="10" fill="#161c28"/>
    <rect x="0"  y="290" width="324" height="44" rx="10" fill="#12161f"/>
    <rect x="0"  y="348" width="324" height="44" rx="10" fill="#0f131b"/>
    <rect x="0"  y="406" width="324" height="44" rx="10" fill="#0d1017"/>
  </g>

  <!-- eyebrow -->
  <text x="90" y="150" fill="#7c8aa5" font-size="30" font-weight="600" letter-spacing="3">VLIST.IO</text>

  <!-- wordmark -->
  <text x="86" y="320" fill="#f6f8fc" font-size="172" font-weight="800" letter-spacing="-4">vlist</text>
  <circle cx="452" cy="306" r="16" fill="url(#accent)"/>

  <!-- tagline -->
  <text x="90" y="400" fill="#aeb6c7" font-size="46" font-weight="500">The virtual list library</text>
  <text x="90" y="456" fill="#aeb6c7" font-size="46" font-weight="500">for every framework.</text>

  <!-- feature pills -->
  <g font-size="26" font-weight="600">
    <rect x="90"  y="512" width="150" height="52" rx="26" fill="#11151e" stroke="#262d3b" stroke-width="1.5"/>
    <text x="165" y="546" fill="#cdd5e4" text-anchor="middle">9.7 KB</text>

    <rect x="256" y="512" width="262" height="52" rx="26" fill="#11151e" stroke="#262d3b" stroke-width="1.5"/>
    <text x="387" y="546" fill="#cdd5e4" text-anchor="middle">zero dependencies</text>

    <rect x="534" y="512" width="232" height="52" rx="26" fill="#11151e" stroke="#262d3b" stroke-width="1.5"/>
    <text x="650" y="546" fill="#cdd5e4" text-anchor="middle">WAI-ARIA ready</text>
  </g>
</svg>
