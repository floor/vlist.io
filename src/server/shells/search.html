<!-- ─── Search Dialog ────────────────────────────── -->

<div class="search-overlay" id="search-overlay">
    <div
        class="search-dialog"
        id="search-dialog"
        role="dialog"
        aria-label="Search"
        aria-modal="true"
    >
        <div class="search-dialog__input-wrap">
            <svg
                class="search-dialog__input-icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
            >
                <circle cx="11" cy="11" r="8" />
                <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <input
                class="search-dialog__input"
                id="search-input"
                type="text"
                placeholder="Search docs, tutorials, examples..."
                autocomplete="off"
                spellcheck="false"
            />
            <button
                class="search-dialog__input-esc"
                id="search-esc"
                type="button"
            >
                Esc
            </button>
        </div>
        <div class="search-dialog__results" id="search-results"></div>
        <div class="search-dialog__footer">
            <span class="search-dialog__footer-hint">
                <span class="search-dialog__footer-key">↑</span>
                <span class="search-dialog__footer-key">↓</span>
                navigate
            </span>
            <span class="search-dialog__footer-hint">
                <span class="search-dialog__footer-key">↵</span>
                open
            </span>
            <span class="search-dialog__footer-hint">
                <span class="search-dialog__footer-key">esc</span>
                close
            </span>
        </div>
    </div>
</div>

<!-- ─── Search behavior ──────────────────────────── -->

<script>
    (function () {
        var overlay = document.getElementById("search-overlay");
        var dialog = document.getElementById("search-dialog");
        var input = document.getElementById("search-input");
        var results = document.getElementById("search-results");
        var trigger = document.getElementById("search-trigger");
        var escBtn = document.getElementById("search-esc");
        var activeIndex = -1;
        var currentResults = [];
        var debounceTimer = null;
        var abortCtrl = null;

        function open() {
            overlay.classList.add("search-overlay--visible");
            dialog.classList.add("search-dialog--visible");
            activeIndex = -1;
            requestAnimationFrame(function () {
                input.focus();
            });
        }

        function close() {
            overlay.classList.remove("search-overlay--visible");
            dialog.classList.remove("search-dialog--visible");
            input.value = "";
            results.innerHTML = "";
            currentResults = [];
            activeIndex = -1;
            if (abortCtrl) {
                abortCtrl.abort();
                abortCtrl = null;
            }
        }

        function isOpen() {
            return overlay.classList.contains("search-overlay--visible");
        }

        // ── Keyboard shortcuts ──

        document.addEventListener("keydown", function (e) {
            // ⌘K / Ctrl+K to open
            if ((e.metaKey || e.ctrlKey) && e.key === "k") {
                e.preventDefault();
                if (isOpen()) {
                    close();
                } else {
                    open();
                }
                return;
            }

            if (!isOpen()) return;

            // Escape to close
            if (e.key === "Escape") {
                e.preventDefault();
                close();
                return;
            }

            // Arrow navigation
            if (e.key === "ArrowDown") {
                e.preventDefault();
                if (currentResults.length > 0) {
                    activeIndex = (activeIndex + 1) % currentResults.length;
                    updateActive();
                }
                return;
            }
            if (e.key === "ArrowUp") {
                e.preventDefault();
                if (currentResults.length > 0) {
                    activeIndex =
                        activeIndex <= 0
                            ? currentResults.length - 1
                            : activeIndex - 1;
                    updateActive();
                }
                return;
            }

            // Enter to navigate
            if (e.key === "Enter") {
                e.preventDefault();
                if (activeIndex >= 0 && activeIndex < currentResults.length) {
                    window.location.href = currentResults[activeIndex].url;
                    close();
                }
                return;
            }
        });

        // ── Click handlers ──

        if (trigger)
            trigger.addEventListener("click", function () {
                open();
            });
        if (escBtn)
            escBtn.addEventListener("click", function () {
                close();
            });
        overlay.addEventListener("click", function (e) {
            if (e.target === overlay) close();
        });

        // Prevent click inside dialog from closing
        dialog.addEventListener("click", function (e) {
            e.stopPropagation();
        });

        // ── Search input ──

        input.addEventListener("input", function () {
            var q = input.value.trim();
            if (debounceTimer) clearTimeout(debounceTimer);

            if (!q) {
                results.innerHTML = "";
                currentResults = [];
                activeIndex = -1;
                return;
            }

            debounceTimer = setTimeout(function () {
                doSearch(q);
            }, 150);
        });

        function doSearch(q) {
            if (abortCtrl) abortCtrl.abort();
            abortCtrl = new AbortController();

            fetch("/api/search?q=" + encodeURIComponent(q), {
                signal: abortCtrl.signal,
            })
                .then(function (r) {
                    return r.json();
                })
                .then(function (data) {
                    currentResults = data.results || [];
                    activeIndex = currentResults.length > 0 ? 0 : -1;
                    renderResults(currentResults);
                })
                .catch(function (err) {
                    if (err.name !== "AbortError")
                        console.error("Search error:", err);
                });
        }

        // ── Render results ──

        function renderResults(items) {
            if (items.length === 0) {
                results.innerHTML =
                    '<div class="search-dialog__empty">No results found</div>';
                return;
            }

            // Group by section
            var groups = {};
            var groupOrder = [];
            for (var i = 0; i < items.length; i++) {
                var sec = items[i].section;
                if (!groups[sec]) {
                    groups[sec] = [];
                    groupOrder.push(sec);
                }
                groups[sec].push(items[i]);
            }

            var html = "";
            var globalIdx = 0;
            for (var g = 0; g < groupOrder.length; g++) {
                var secName = groupOrder[g];
                var secItems = groups[secName];
                html += '<div class="search-dialog__group">';
                html +=
                    '<div class="search-dialog__group-label">' +
                    esc(secName) +
                    "</div>";
                for (var j = 0; j < secItems.length; j++) {
                    var item = secItems[j];
                    var active =
                        globalIdx === activeIndex
                            ? " search-dialog__result--active"
                            : "";
                    html +=
                        '<a href="' +
                        esc(item.url) +
                        '" class="search-dialog__result' +
                        active +
                        '" data-idx="' +
                        globalIdx +
                        '">';
                    html += '<div class="search-dialog__result-body">';
                    html +=
                        '<div class="search-dialog__result-title">' +
                        esc(item.title) +
                        "</div>";
                    html +=
                        '<div class="search-dialog__result-snippet">' +
                        esc(item.snippet) +
                        "</div>";
                    html += "</div>";
                    html +=
                        '<span class="search-dialog__result-badge">' +
                        esc(item.group || item.section) +
                        "</span>";
                    html +=
                        '<svg class="search-dialog__result-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>';
                    html += "</a>";
                    globalIdx++;
                }
                html += "</div>";
            }

            results.innerHTML = html;

            // Click/hover handlers on results
            var links = results.querySelectorAll(".search-dialog__result");
            for (var k = 0; k < links.length; k++) {
                (function (link) {
                    link.addEventListener("mouseenter", function () {
                        activeIndex = parseInt(
                            link.getAttribute("data-idx"),
                            10,
                        );
                        updateActive();
                    });
                    link.addEventListener("click", function () {
                        close();
                    });
                })(links[k]);
            }
        }

        function updateActive() {
            var all = results.querySelectorAll(".search-dialog__result");
            for (var i = 0; i < all.length; i++) {
                if (i === activeIndex) {
                    all[i].classList.add("search-dialog__result--active");
                    // Scroll into view if needed
                    all[i].scrollIntoView({ block: "nearest" });
                } else {
                    all[i].classList.remove("search-dialog__result--active");
                }
            }
        }

        function esc(str) {
            if (!str) return "";
            var d = document.createElement("div");
            d.textContent = str;
            return d.innerHTML;
        }
    })();
</script>
