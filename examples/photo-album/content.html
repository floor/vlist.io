<div class="container">
    <header>
        <h1>Photo Album</h1>
        <p class="description">
            Virtualized 2D photo gallery with real images from Lorem Picsum.
            Toggle between grid and masonry layouts, adjust columns and gap —
            only visible rows are rendered.
        </p>
    </header>

    <div class="split-layout">
        <div class="split-main split-main--full">
            <h2 class="sr-only">Photos</h2>
            <div id="list-container"></div>
        </div>

        <aside class="split-panel">
            <!-- Layout -->
            <section class="ui-section">
                <h3 class="ui-title">Layout</h3>

                <div class="ui-row">
                    <label class="ui-label">Mode</label>
                    <div class="ui-segmented" id="layout-mode">
                        <button
                            class="ui-segmented__btn ui-segmented__btn--active"
                            data-mode="grid"
                        >
                            Grid
                        </button>
                        <button class="ui-segmented__btn" data-mode="masonry">
                            Masonry
                        </button>
                    </div>
                </div>

                <div class="ui-row">
                    <label class="ui-label">Primary axis</label>
                    <div class="ui-segmented" id="orientation-buttons">
                        <button
                            class="ui-segmented__btn ui-segmented__btn--active"
                            data-orientation="vertical"
                        >
                            Y
                        </button>
                        <button
                            class="ui-segmented__btn"
                            data-orientation="horizontal"
                        >
                            X
                        </button>
                    </div>
                </div>

                <div class="ui-row">
                    <label class="ui-label">Aspect ratio</label>
                    <div class="ui-btn-group" id="ratio-buttons">
                        <button
                            class="ui-ctrl-btn ui-ctrl-btn--active"
                            data-ratio="0.75"
                        >
                            4:3
                        </button>
                        <button class="ui-ctrl-btn" data-ratio="1">1:1</button>
                        <button class="ui-ctrl-btn" data-ratio="1.33">3:4</button>
                    </div>
                </div>

                <div class="ui-row">
                    <label class="ui-label" id="columns-label">Columns</label>
                    <span class="ui-value" id="columns-value">4</span>
                    <input
                        type="range"
                        id="columns-slider"
                        class="ui-slider"
                        min="2"
                        max="12"
                        step="1"
                        value="4"
                    />
                </div>

                <div class="ui-row">
                    <label class="ui-label">Gap</label>
                    <span class="ui-value" id="gap-value">8px</span>
                    <input
                        type="range"
                        id="gap-slider"
                        class="ui-slider"
                        min="0"
                        max="24"
                        step="2"
                        value="8"
                    />
                </div>

                <div class="ui-row">
                    <label class="ui-label">Radius</label>
                    <span class="ui-value" id="radius-value">8px</span>
                    <input
                        type="range"
                        id="radius-slider"
                        class="ui-slider"
                        min="0"
                        max="32"
                        step="2"
                        value="8"
                    />
                </div>
            </section>

            <!-- Navigation -->
            <section class="ui-section">
                <h3 class="ui-title">Navigation</h3>
                <div class="ui-row">
                    <div class="ui-btn-group">
                        <button
                            id="btn-first"
                            class="ui-btn ui-btn--icon"
                            title="First"
                        >
                            <i class="icon icon--up"></i>
                        </button>
                        <button
                            id="btn-middle"
                            class="ui-btn ui-btn--icon"
                            title="Middle"
                        >
                            <i class="icon icon--center"></i>
                        </button>
                        <button
                            id="btn-last"
                            class="ui-btn ui-btn--icon"
                            title="Last"
                        >
                            <i class="icon icon--down"></i>
                        </button>
                        <button
                            id="btn-random"
                            class="ui-btn ui-btn--icon"
                            title="Random"
                        >
                            <i class="icon icon--shuffle"></i>
                        </button>
                    </div>
                    <label class="ui-label">Follow focus</label>
                    <label class="ui-switch">
                        <input
                            type="checkbox"
                            id="follow-focus-toggle"
                            checked
                        />
                        <span class="ui-switch__track"></span>
                    </label>
                </div>
            </section>

            <!-- Photo Detail -->
            <section class="ui-section">
                <h3 class="ui-title">Last clicked</h3>
                <div class="ui-detail" id="photo-detail">
                    <span class="ui-detail__empty"
                        >Click a photo to see details</span
                    >
                </div>
            </section>
        </aside>
    </div>

    <div class="example-info" id="example-info">
        <div class="example-info__left">
            <span class="example-info__stat">
                <strong id="info-progress">0%</strong>
            </span>
            <span class="example-info__stat">
                <span id="info-velocity">0.00</span> /
                <strong id="info-velocity-avg">0.00</strong>
                <span class="example-info__unit">px/ms</span>
            </span>
            <span class="example-info__stat">
                <span id="info-dom">0</span> /
                <strong id="info-total">0</strong>
                <span class="example-info__unit">items</span>
            </span>
        </div>
        <div class="example-info__right">
            <span class="example-info__stat">
                <strong id="info-mode">grid</strong>
            </span>
            <span class="example-info__stat">
                <strong id="info-orientation">Y</strong>
            </span>
        </div>
    </div>
</div>
