<div class="container">
    <header>
        <h1>Bounded Scroll</h1>
        <p class="description">
            1,000,000 items with <code>scroll: &#123; mode: "bounded" &#125;</code> —
            no <code>scale</code> plugin, no compression. The content element is
            sized to a viewport-multiple runway and a logical origin rebases near
            the edges (RFC-012).
        </p>
    </header>

    <div class="split-layout">
        <div class="split-main">
            <h2 class="sr-only">Items</h2>
            <div id="list-container"></div>
        </div>

        <aside class="split-panel">
            <section class="ui-section">
                <h3 class="ui-title">Navigation</h3>
                <div class="ui-row">
                    <div class="ui-btn-group">
                        <button id="btn-first" class="ui-btn">First</button>
                        <button id="btn-middle" class="ui-btn">Middle</button>
                        <button id="btn-last" class="ui-btn">Last</button>
                    </div>
                </div>
            </section>
        </aside>
    </div>
</div>
